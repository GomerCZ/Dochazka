<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Docházka Multi</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --holiday: #FFF2F2; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #1C1C1E; }

        .sticky-header {
            position: sticky; top: 0; z-index: 1000;
            background-color: var(--bg); padding: 10px 10px 5px 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container { width: 100%; max-width: 600px; margin: 0 auto; }
        .controls { background: var(--card); border-radius: 14px; padding: 12px; margin-bottom: 8px; }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        select, input[type="text"] { flex: 1; padding: 10px; border: 1px solid #DDD; border-radius: 8px; font-size: 1rem; }
        
        .summary-card { background: var(--primary); color: white; border-radius: 14px; padding: 10px; text-align: center; }
        .summary-card h1 { margin: 0; font-size: 1.6rem; }

        .content { padding: 10px; }
        .table-container { background: var(--card); border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #F9F9F9; padding: 10px; font-size: 0.7rem; color: #8E8E93; text-transform: uppercase; text-align: left;}
        td { padding: 8px 10px; border-bottom: 1px solid #F2F2F7; vertical-align: top; }
        
        .day-row.weekend { background-color: #FAFAFA; }
        .day-row.holiday { background-color: var(--holiday); }
        .day-num { font-weight: bold; width: 40px; font-size: 0.9rem; pt: 12px; }
        .holiday-name { font-size: 0.65rem; color: #FF3B30; display: block; font-weight: normal; }

        /* Intervaly */
        .intervals-container { display: flex; flex-direction: column; gap: 8px; }
        .interval-row { display: flex; align-items: center; gap: 5px; }
        .time-input { width: 65px; padding: 6px; border: 1px solid #DDD; border-radius: 6px; font-size: 0.85rem; }
        .btn-add { background: var(--primary); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; font-size: 1.2rem; line-height: 1; cursor: pointer; margin-top: 5px; }
        .btn-del { color: #FF3B30; background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 0 5px; }

        .note-input { width: 100%; margin-top: 8px; padding: 8px; border: 1px solid #EEE; border-radius: 8px; font-size: 0.8rem; box-sizing: border-box; }
        .hours-cell { font-weight: bold; color: var(--primary); text-align: right; width: 60px; font-size: 0.9rem; padding-top: 12px; }

        .sync-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0 40px 0; }
        .btn { padding: 14px; border: none; border-radius: 12px; font-weight: bold; color: white; font-size: 0.9rem; cursor: pointer; }
        .btn-save { background: #34C759; }
        .btn-load { background: #5856D6; }
    </style>
</head>
<body>

<div class="container">
    <div class="sticky-header">
        <div class="controls">
            <div class="row">
                <select id="selectMonth" onchange="initCalendar()"></select>
                <select id="selectYear" onchange="initCalendar()"></select>
            </div>
            <div class="row">
                <input type="text" id="userName" placeholder="Jméno uživatele" onchange="saveUserName()">
            </div>
        </div>
        <div class="summary-card">
            <h1 id="totalHours">0.00 h</h1>
            <p id="userStatus">Načítání...</p>
        </div>
    </div>

    <div class="content">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Den</th>
                        <th>Časové úseky</th>
                        <th style="text-align:right">Hodin</th>
                    </tr>
                </thead>
                <tbody id="calendarBody"></tbody>
            </table>
        </div>

        <div class="sync-buttons">
            <button class="btn btn-save" onclick="syncToGoogle()">↑ Zálohovat Disk</button>
            <button class="btn btn-load" onclick="syncFromGoogle()">↓ Načíst Disk</button>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURACE ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyPHAL6Eji06WGRLk6Wwb7ebuKi86-tRasmVF9sDEV9EYnQ_6Qa29Oz09W-gKm6esKr/exec";
    
    let attendanceData = JSON.parse(localStorage.getItem('attendance_v5') || '{}');
    let currentUser = localStorage.getItem('attendance_user') || '';
    
    const months = ["Leden", "Únor", "Březen", "Duben", "Květen", "Červen", "Červenec", "Srpen", "Září", "Říjen", "Listopad", "Prosinec"];
    const czechHolidays = {"01-01":"Nový rok","05-01":"Svátek práce","05-08":"Den vítězství","07-05":"Cyril a Metoděj","07-06":"Jan Hus","09-28":"Státnost","10-28":"Vznik ČSR","11-17":"Svoboda","12-24":"Štědrý den","12-25":"1. svátek","12-26":"2. svátek"};
    const easterHolidays = {"2026-04-03":"Velký pátek","2026-04-06":"Velikonoce"};

    const selMonth = document.getElementById('selectMonth');
    const selYear = document.getElementById('selectYear');
    const now = new Date();

    if (selMonth.options.length === 0) {
        months.forEach((m, i) => selMonth.add(new Option(m, i, i===now.getMonth(), i===now.getMonth())));
        for(let y = 2025; y <= 2027; y++) selYear.add(new Option(y, y, y===now.getFullYear(), y===now.getFullYear()));
    }

    function saveUserName() {
        currentUser = document.getElementById('userName').value.trim();
        localStorage.setItem('attendance_user', currentUser);
        document.getElementById('userStatus').innerText = "Uživatel: " + (currentUser || "Nepřihlášen");
    }

    function initCalendar() {
        const month = parseInt(selMonth.value);
        const year = parseInt(selYear.value);
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const tbody = document.getElementById('calendarBody');
        tbody.innerHTML = '';
        let monthlyTotal = 0;

        for (let d = 1; d <= daysInMonth; d++) {
            const dateKey = `${year}-${String(month+1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const shortKey = `${String(month+1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            
            // Migrace nebo inicializace dat
            if (!attendanceData[dateKey]) attendanceData[dateKey] = { intervals: [{start:"", end:""}], note: "" };
            // Pokud jsou stará data (jen start/end), převeď je na pole
            if (attendanceData[dateKey].start !== undefined) {
                attendanceData[dateKey].intervals = [{start: attendanceData[dateKey].start, end: attendanceData[dateKey].end}];
                delete attendanceData[dateKey].start;
                delete attendanceData[dateKey].end;
            }

            const dayObj = new Date(year, month, d);
            const isWeekend = (dayObj.getDay() === 0 || dayObj.getDay() === 6);
            const holidayName = czechHolidays[shortKey] || easterHolidays[dateKey] || "";

            let dayTotal = 0;
            let intervalsHTML = `<div class="intervals-container">`;
            
            attendanceData[dateKey].intervals.forEach((interval, idx) => {
                if (interval.start && interval.end) {
                    const s = new Date(`2000-01-01T${interval.start}`);
                    const e = new Date(`2000-01-01T${interval.end}`);
                    let diff = (e - s) / 3600000;
                    if (diff < 0) diff += 24;
                    dayTotal += diff;
                }

                intervalsHTML += `
                    <div class="interval-row">
                        <input type="time" class="time-input" value="${interval.start}" onchange="updateTime('${dateKey}', ${idx}, 'start', this.value)">
                        <span>–</span>
                        <input type="time" class="time-input" value="${interval.end}" onchange="updateTime('${dateKey}', ${idx}, 'end', this.value)">
                        ${idx > 0 ? `<button class="btn-del" onclick="removeInterval('${dateKey}', ${idx})">✕</button>` : ''}
                    </div>
                `;
            });

            if (attendanceData[dateKey].intervals.length < 10) {
                intervalsHTML += `<button class="btn-add" onclick="addInterval('${dateKey}')">+</button>`;
            }
            intervalsHTML += `<input type="text" class="note-input" placeholder="Poznámka..." value="${attendanceData[dateKey].note||''}" onchange="updateNote('${dateKey}', this.value)">`;
            intervalsHTML += `</div>`;

            monthlyTotal += dayTotal;

            const tr = document.createElement('tr');
            tr.className = `day-row ${isWeekend ? 'weekend' : ''} ${holidayName ? 'holiday' : ''}`;
            tr.innerHTML = `
                <td class="day-num">${d}.${holidayName ? `<span class="holiday-name">${holidayName}</span>` : ''}</td>
                <td>${intervalsHTML}</td>
                <td class="hours-cell">${dayTotal > 0 ? dayTotal.toFixed(2) : ''}</td>
            `;
            tbody.appendChild(tr);
        }
        document.getElementById('totalHours').innerText = monthlyTotal.toFixed(2) + " h";
        document.getElementById('userName').value = currentUser;
        document.getElementById('userStatus').innerText = "Uživatel: " + (currentUser || "Nepřihlášen");
    }

    function updateTime(dateKey, idx, field, value) {
        attendanceData[dateKey].intervals[idx][field] = value;
        save();
        initCalendar();
    }

    function updateNote(dateKey, value) {
        attendanceData[dateKey].note = value;
        save();
    }

    function addInterval(dateKey) {
        if (attendanceData[dateKey].intervals.length < 10) {
            attendanceData[dateKey].intervals.push({start: "", end: ""});
            save();
            initCalendar();
        }
    }

    function removeInterval(dateKey, idx) {
        attendanceData[dateKey].intervals.splice(idx, 1);
        save();
        initCalendar();
    }

    function save() {
        localStorage.setItem('attendance_v5', JSON.stringify(attendanceData));
    }

    async function syncToGoogle() {
        if (!currentUser || SCRIPT_URL.includes("TVOJE_URL")) return alert("Nastav SCRIPT_URL!");
        try {
            await fetch(SCRIPT_URL, {
                method: "POST", mode: 'no-cors',
                body: JSON.stringify({ user: currentUser, data: attendanceData })
            });
            alert("Zálohováno!");
        } catch (e) { alert("Chyba synchronizace"); }
    }

    async function syncFromGoogle() {
        try {
            const res = await fetch(`${SCRIPT_URL}?user=${currentUser}`);
            attendanceData = await res.json();
            save();
            initCalendar();
            alert("Data stažena.");
        } catch (e) { alert("Chyba při stahování."); }
    }

    initCalendar();
</script>

</body>
</html>
